<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DailyDeals</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" style="text-decoration: none; color: white;">
                    <h1 class="logo">🎁 DailyDeals</h1>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-page">
            <div class="auth-container">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join DailyDeals and start saving!</p>

                <form id="signupForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            required 
                            placeholder="John Doe"
                            autocomplete="name"
                        >
                        <div id="nameError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            placeholder="your@email.com"
                            autocomplete="email"
                        >
                        <div id="emailError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                required 
                                placeholder="Minimum 8 characters"
                                autocomplete="new-password"
                                minlength="8"
                            >
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                                👁️
                            </button>
                        </div>
                        <div id="passwordError" class="field-error-message" style="display: none;"></div>
                        <small style="color: #718096; font-size: 0.85rem;">
                            Must be at least 8 characters with uppercase, lowercase, and numbers
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                required 
                                placeholder="Re-enter your password"
                                autocomplete="new-password"
                                minlength="8"
                            >
                            <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Show password">
                                👁️
                            </button>
                        </div>
                        <div id="confirmPasswordError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div class="form-group" style="margin-top: 0.5rem;">
                        <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9rem;">
                            <input 
                                type="checkbox" 
                                id="termsCheckbox" 
                                style="margin-right: 0.5rem; cursor: pointer;"
                            >
                            <span>I agree to the <a href="terms.html" target="_blank" style="color: #667eea; text-decoration: underline;">Terms & Conditions</a></span>
                        </label>
                        <div id="termsError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div id="errorMessage" class="error-message" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Amazon Cognito Identity SDK -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    
    <!-- Theme Persistence -->
    <script>
        // Apply saved theme immediately (before page renders)
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <script src="auth.js"></script>
    <script>
        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Check if already logged in
        auth.isAuthenticated().then(isAuth => {
            if (isAuth) {
                window.location.href = 'index.html';
            }
        });

        // Password visibility toggles
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Form validation function
        function validateForm() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            const termsError = document.getElementById('termsError');
            
            let isValid = true;
            
            // Clear previous errors
            nameError.style.display = 'none';
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            confirmPasswordError.style.display = 'none';
            termsError.style.display = 'none';
            
            // Validate name
            if (!name) {
                nameError.textContent = 'Name is required';
                nameError.style.display = 'block';
                isValid = false;
            } else if (name.length < 2) {
                nameError.textContent = 'Name must be at least 2 characters';
                nameError.style.display = 'block';
                isValid = false;
            }
            
            // Validate email
            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.style.display = 'block';
                isValid = false;
            } else {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.style.display = 'block';
                    isValid = false;
                }
            }
            
            // Validate password
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (password.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                // Check for uppercase, lowercase, and number
                const hasUppercase = /[A-Z]/.test(password);
                const hasLowercase = /[a-z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                
                if (!hasUppercase || !hasLowercase || !hasNumber) {
                    passwordError.textContent = 'Password must contain uppercase, lowercase, and numbers';
                    passwordError.style.display = 'block';
                    isValid = false;
                }
            }
            
            // Validate confirm password
            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Please confirm your password';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Passwords do not match';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            }
            
            // Validate terms checkbox
            if (!termsChecked) {
                termsError.textContent = 'You must agree to the Terms & Conditions';
                termsError.style.display = 'block';
                isValid = false;
            }
            
            // If validation passed, strip whitespace from input fields
            if (isValid) {
                document.getElementById('name').value = name;
                document.getElementById('email').value = email;
            }
            
            return isValid;
        }

        // Handle signup form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate form first
            if (!validateForm()) {
                return; // Stop if validation fails
            }
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Clear previous errors
            errorDiv.style.display = 'none';
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            try {
                await auth.signUp(email, password, name);
                
                showToast('Account created successfully!', 'success');
                
                // Auto sign-in after successful signup
                setTimeout(async () => {
                    try {
                        await auth.signIn(email, password);
                        window.location.href = 'index.html';
                    } catch (loginError) {
                        // If auto-login fails, redirect to login page
                        window.location.href = 'login.html';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Signup error:', error);
                let errorMessage = error.message || 'Signup failed. Please try again.';
                
                // Make error messages more user-friendly
                if (errorMessage.includes('PreAuthentication failed')) {
                    errorMessage = 'There was an issue creating your account. Please try again.';
                } else if (errorMessage.includes('User already exists')) {
                    errorMessage = 'An account with this email already exists. Please sign in instead.';
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
                showToast(errorMessage, 'error');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
