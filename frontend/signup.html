<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DailyDeals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" style="text-decoration: none; color: white;">
                    <h1 class="logo">🎁 DailyDeals</h1>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-page">
            <div class="auth-container">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join DailyDeals and start saving!</p>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            required 
                            placeholder="John Doe"
                            autocomplete="name"
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            placeholder="your@email.com"
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                required 
                                placeholder="Minimum 8 characters"
                                autocomplete="new-password"
                                minlength="8"
                            >
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                                👁️
                            </button>
                        </div>
                        <small style="color: #718096; font-size: 0.85rem;">
                            Must be at least 8 characters with uppercase, lowercase, and numbers
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                required 
                                placeholder="Re-enter your password"
                                autocomplete="new-password"
                                minlength="8"
                            >
                            <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Show password">
                                👁️
                            </button>
                        </div>
                    </div>

                    <div id="errorMessage" class="error-message" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Amazon Cognito Identity SDK -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    
    <!-- Theme Persistence -->
    <script>
        // Apply saved theme immediately (before page renders)
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <script src="auth.js"></script>
    <script>
        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Check if already logged in
        auth.isAuthenticated().then(isAuth => {
            if (isAuth) {
                window.location.href = 'index.html';
            }
        });

        // Password visibility toggles
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Handle signup form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Clear previous errors
            errorDiv.style.display = 'none';
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                showToast('Passwords do not match', 'error');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            try {
                await auth.signUp(email, password, name);
                
                showToast('Account created successfully!', 'success');
                
                // Auto sign-in after successful signup
                setTimeout(async () => {
                    try {
                        await auth.signIn(email, password);
                        window.location.href = 'index.html';
                    } catch (loginError) {
                        // If auto-login fails, redirect to login page
                        window.location.href = 'login.html';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Signup error:', error);
                let errorMessage = error.message || 'Signup failed. Please try again.';
                
                // Make error messages more user-friendly
                if (errorMessage.includes('PreAuthentication failed')) {
                    errorMessage = 'There was an issue creating your account. Please try again.';
                } else if (errorMessage.includes('User already exists')) {
                    errorMessage = 'An account with this email already exists. Please sign in instead.';
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
                showToast(errorMessage, 'error');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
