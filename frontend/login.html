<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DailyDeals</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" style="text-decoration: none; color: white;">
                    <h1 class="logo">🎁 DailyDeals</h1>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-page">
            <div class="auth-container">
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your account</p>

                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            required 
                            placeholder="your@email.com"
                            autocomplete="email"
                        >
                        <div id="emailError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                required 
                                placeholder="Enter your password"
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                                👁️
                            </button>
                        </div>
                        <div id="passwordError" class="field-error-message" style="display: none;"></div>
                    </div>

                    <div id="errorMessage" class="error-message" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Amazon Cognito Identity SDK -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    
    <!-- Theme Persistence -->
    <script>
        // Apply saved theme immediately (before page renders)
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <script src="auth.js"></script>
    <script>
        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Check if already logged in
        auth.isAuthenticated().then(isAuth => {
            if (isAuth) {
                // Redirect to home or intended page
                const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                window.location.href = redirectTo;
            }
        });

        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Form validation function
        function validateForm() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            
            let isValid = true;
            
            // Clear previous errors
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            
            // Validate email
            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.style.display = 'block';
                isValid = false;
            } else {
                // Basic email format validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.style.display = 'block';
                    isValid = false;
                }
            }
            
            // Validate password
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.style.display = 'block';
                isValid = false;
            }
            
            return isValid;
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate form first
            if (!validateForm()) {
                return; // Stop if validation fails
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Clear previous errors
            errorDiv.style.display = 'none';
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                await auth.signIn(email, password);
                
                showToast('Login successful!', 'success');
                
                // Redirect to home or intended page
                setTimeout(() => {
                    const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                    window.location.href = redirectTo;
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                
                // Better error messages based on Cognito error codes
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'UserNotFoundException') {
                    errorMessage = 'No account found with this email. Please sign up first.';
                } else if (error.code === 'NotAuthorizedException') {
                    errorMessage = 'Incorrect password. Please try again.';
                } else if (error.code === 'UserNotConfirmedException') {
                    errorMessage = 'Account not confirmed. Please check your email.';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
                showToast(errorMessage, 'error');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
