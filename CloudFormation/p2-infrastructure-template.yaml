AWSTemplateFormatVersion: '2010-09-09'
Description: 'Infrastructure for E-Commerce Deals & Vouchers Platform - Project 2'

Resources:
  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'deals-vouchers-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'OAC-${FrontendBucket}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # DynamoDB Tables
  DealsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Deals-P2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: dealId
          AttributeType: S
      KeySchema:
        - AttributeName: dealId
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Orders-P2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

  VouchersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Vouchers-P2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: voucherCode
          AttributeType: S
      KeySchema:
        - AttributeName: voucherCode
          KeyType: HASH

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DealsVouchersLambdaRole-P2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt DealsTable.Arn
                  - !GetAtt OrdersTable.Arn
                  - !GetAtt VouchersTable.Arn

  # Lambda Functions
  GetDealsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: getDeals-P2
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DEALS_TABLE: !Ref DealsTable
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Placeholder - replace with actual code
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ message: 'getDeals function' })
            };
          };

  GetDealByIdFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: getDealById-P2
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DEALS_TABLE: !Ref DealsTable
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ message: 'getDealById function' })
            };
          };

  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: createOrder-P2
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          DEALS_TABLE: !Ref DealsTable
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ message: 'createOrder function' })
            };
          };

  ValidateVoucherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: validateVoucher-P2
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          VOUCHERS_TABLE: !Ref VouchersTable
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ message: 'validateVoucher function' })
            };
          };

  # API Gateway REST API
  DealsAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: DealsVouchersAPI-P2
      Description: API for Deals and Vouchers Platform
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resources and Methods would go here
  # (This is a simplified version - you'll create these via console)

Outputs:
  CloudFrontURL:
    Description: CloudFront Distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName
  
  S3BucketName:
    Description: S3 Bucket for Frontend
    Value: !Ref FrontendBucket
  
  DealsTableName:
    Description: DynamoDB Deals Table
    Value: !Ref DealsTable
  
  OrdersTableName:
    Description: DynamoDB Orders Table
    Value: !Ref OrdersTable
  
  VouchersTableName:
    Description: DynamoDB Vouchers Table
    Value: !Ref VouchersTable
  
  APIGatewayName:
    Description: API Gateway REST API
    Value: !Ref DealsAPI
